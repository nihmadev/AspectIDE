name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libxdo-dev patchelf wget
      - name: Cargo fmt
        run: cargo fmt --all --check
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace
      - name: Core performance benchmark
        run: cargo run -p lux-bench -- --assert --output target/lux-bench-report.json
      - name: Upload performance benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lux-core-performance-report
          path: target/lux-bench-report.json
          if-no-files-found: ignore
          retention-days: 14

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Release policy tests
        run: node .github/scripts/test-release-policy.mjs
