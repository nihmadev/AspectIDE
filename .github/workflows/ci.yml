name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-latest
          - label: macOS
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libxdo-dev patchelf wget
      - name: Cargo fmt
        run: cargo fmt --all --check
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace
      # Performance thresholds are calibrated for the Linux runner; macOS runner
      # hardware varies too much for a stable --assert, so the benchmark stays Linux-only.
      - name: Core performance benchmark
        if: runner.os == 'Linux'
        run: cargo run -p aspect-bench -- --assert --output target/aspect-bench-report.json
      - name: Upload performance benchmark report
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: aspect-core-performance-report
          path: target/aspect-bench-report.json
          if-no-files-found: ignore
          retention-days: 14

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Release policy tests
        run: node .github/scripts/test-release-policy.mjs
