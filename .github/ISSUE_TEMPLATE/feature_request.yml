name: Feature request
description: Propose a focused Lux IDE workflow or capability.
title: "feature: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Good feature requests describe a workflow, not only a technology choice.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer workflow is blocked or too slow today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, command, or API you expect.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Likely layer
      options:
        - Rust engine
        - React workbench
        - Tauri IPC/events
        - LSP/DAP
        - AI tools/agent
        - Extension system
        - Installer/distribution
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or adjacent tools if relevant.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, sketches, links, or implementation notes.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: This request is about Lux IDE behavior, not only personal configuration.
          required: true
