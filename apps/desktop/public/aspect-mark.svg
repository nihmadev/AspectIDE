<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AspectIDE mark</title>
  <desc id="desc">A dark square application mark with a luminous angular AspectIDE monogram.</desc>
